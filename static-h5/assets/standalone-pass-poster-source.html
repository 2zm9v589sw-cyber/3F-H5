<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box}html,body{margin:0;width:1242px;height:1700px;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#10233f}body{position:relative;background:#eef8f4}.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.veil{position:absolute;inset:0;background:rgba(255,255,255,.34)}
.sheet{position:absolute;inset:68px 70px 72px;background:rgba(255,255,255,.94);border:1px solid #d8e5ee;border-radius:42px;padding:70px 42px 42px;box-shadow:0 20px 55px rgba(33,74,91,.13)}
.title{text-align:center}.title h1{font-size:62px;line-height:1.2;margin:0;font-weight:900;letter-spacing:0}.title p{font-size:29px;color:#52667f;margin:17px 0 0}
.pricebox{display:grid;grid-template-columns:39% 61%;margin-top:70px;border:2px solid #dce6f0;border-radius:26px;overflow:hidden;background:#fff}.price{padding:30px 38px;background:#f5fbfa}.old{font-size:25px;color:#6d7d91;text-decoration:line-through}.label{font-size:26px;color:#008f82;font-weight:800;margin-top:15px}.amount{font-size:82px;line-height:1;color:#f05232;font-weight:900;margin-top:4px}.amount i{font-size:32px;font-style:normal;margin-left:9px}.rules{padding:31px 34px;display:flex;flex-direction:column;justify-content:center;gap:15px;font-size:25px;line-height:1.35;color:#405670}.rules div{display:flex;align-items:flex-start}.rules b{flex:0 0 9px;width:9px;height:9px;border-radius:50%;background:#f3aa19;margin:12px 14px 0 0}
.projects{display:grid;gap:13px;margin-top:42px}.item{display:grid;grid-template-columns:72px 1fr;align-items:center;background:#f6f9fd;border:1px solid #dce5ef;border-radius:18px;padding:16px 23px}.num{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;background:#13b88a;font-size:26px;font-weight:800}.item:nth-child(2) .num{background:#f6a313}.item:nth-child(3) .num{background:#397ce8}.item:nth-child(4) .num{background:#f34643}.item:nth-child(5) .num{background:#7b52ef}.copy h2{font-size:29px;margin:0 0 5px}.copy p{font-size:20px;line-height:1.4;color:#62758d;margin:0}
.notice{position:absolute;left:42px;right:42px;bottom:42px;border:2px solid #f5b33d;border-radius:18px;padding:16px 22px;text-align:center;color:#cf6529;background:#fffaf0;font-size:21px;font-weight:700}
</style>
</head>
<body><img class="bg" src="summer-pass-poster-bg.png"><div class="veil"></div><main class="sheet">
  <header class="title"><h1>亲子一站式通玩套餐</h1><p>五大项目一次打卡 · 快乐放满整个夏天</p></header>
  <section class="pricebox"><div class="price"><div class="old">通票原价 238元</div><div class="label">活动特惠价</div><div class="amount">119<i>元</i></div></div><div class="rules"><div><b></b><span>仅限购票当天一次性核销使用</span></div><div><b></b><span>一票仅限1人使用</span></div><div><b></b><span>五大项目当日各体验1次</span></div></div></section>
  <section class="projects">
    <article class="item"><div class="num">1</div><div class="copy"><h2>童趣乐园</h2><p>入园全天不限时畅玩，当日可自由进出园区。</p></div></article>
    <article class="item"><div class="num">2</div><div class="copy"><h2>爱就推门</h2><p>店内益智玩具、互动体验不限时畅玩。</p></div></article>
    <article class="item"><div class="num">3</div><div class="copy"><h2>第九星球观影</h2><p>兑换当日专属影片一场，完整观看一部影片。</p></div></article>
    <article class="item"><div class="num">4</div><div class="copy"><h2>卡雷拉路轨赛车</h2><p>专属赛道体验10分钟，操控赛车竞速比拼。</p></div></article>
    <article class="item"><div class="num">5</div><div class="copy"><h2>机器人互动体验</h2><p>单人完整体验一轮机器人项目。</p></div></article>
  </section>
  <footer class="notice">独立售卖/使用活动，不参与电子券发券及用券核销</footer>
</main></body></html>
